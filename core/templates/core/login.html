{% extends 'core/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
  <div class="card p-4" style="width:100%;max-width:400px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold"><i class="bi bi-book-half text-primary"></i> StudyPlan</h2>
      <p class="text-muted">Faça login para continuar</p>
    </div>
    <form method="post">{% csrf_token %}
      {% if form.errors %}<div class="alert alert-danger">Usuário ou senha inválidos.</div>{% endif %}
      <div class="mb-3"><label class="form-label">Usuário</label><input type="text" name="username" class="form-control" autofocus required></div>
      <div class="mb-3"><label class="form-label">Senha</label><input type="password" name="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
    <hr><p class="text-center text-muted mb-0">Não tem conta? <a href="{% url 'cadastro' %}">Cadastre-se</a></p>
  </div>
</div>
{% endblock %}
