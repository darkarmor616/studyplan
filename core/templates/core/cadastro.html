{% extends 'core/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
  <div class="card p-4" style="width:100%;max-width:420px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold"><i class="bi bi-book-half text-primary"></i> StudyPlan</h2>
      <p class="text-muted">Crie sua conta</p>
    </div>
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
               class="form-control {% if field.errors %}is-invalid{% endif %}"
               {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
    </form>
    <hr><p class="text-center text-muted mb-0">Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
  </div>
</div>
{% endblock %}
